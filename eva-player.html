<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>EVA Konference</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{--bg:#09090f;--bg2:#0e0e17;--bg3:#13131f;--bg4:#1a1a28;--gold:#c9a84c;--gold2:#e8c97a;--gold3:#f5e0a0;--border:rgba(201,168,76,.12);--border2:rgba(201,168,76,.25);--text:#eeeef5;--text2:#b8b8cc;--muted:#6a6a88;--danger:#e05555;--success:#4ecb8d;--r:10px}
*{box-sizing:border-box;margin:0;padding:0}
html{font-size:120%}html,body{height:100%;font-family:"Jost",sans-serif;background:var(--bg);color:var(--text)}
body{display:flex;flex-direction:column}
body::after{content:"";position:fixed;inset:0;pointer-events:none;z-index:0;background:radial-gradient(ellipse 60% 40% at 50% 20%,rgba(201,168,76,.07) 0%,transparent 65%)}
.screen{display:none;flex-direction:column;flex:1;overflow:hidden;position:relative;z-index:1}
.screen.on{display:flex}
header{display:flex;align-items:center;gap:10px;padding:10px 16px;border-bottom:1px solid var(--border2);background:var(--bg2);flex-shrink:0;position:sticky;top:0;z-index:10}
.logo{height:26px;width:auto}
.hdr-name{font-size:.78rem;color:var(--muted);margin-left:2px}
.hdr-r{margin-left:auto;display:flex;gap:8px;align-items:center}
.clk{font-family:"Cormorant Garamond",serif;font-size:.95rem;font-weight:600;color:var(--gold2);letter-spacing:2px}
.dot{width:6px;height:6px;border-radius:50%;background:var(--success);animation:p 1.8s infinite}
@keyframes p{0%,100%{opacity:1}50%{opacity:.3}}
.tabs{display:flex;border-bottom:1px solid var(--border);background:var(--bg2);flex-shrink:0}
.tab{flex:1;padding:11px 0;text-align:center;font-size:.82rem;font-weight:500;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;transition:all .15s}
.tab.on{color:var(--gold);border-bottom-color:var(--gold)}
.main{flex:1;overflow-y:auto;padding:16px;max-width:500px;margin:0 auto;width:100%}
/* JOIN */
.join-w{display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1;padding:28px 18px;text-align:center}
.join-logo{height:60px;width:auto;margin-bottom:8px}
.join-sub{font-size:.84rem;color:var(--muted);margin-bottom:24px}
.join-card{width:100%;max-width:340px;background:var(--bg2);border:1px solid var(--border2);border-radius:14px;padding:24px 20px}
.join-ev{font-size:.74rem;color:var(--muted);background:var(--bg3);border-radius:8px;padding:6px 12px;margin-bottom:14px;border:1px solid var(--border);text-align:center}
.lbl{display:block;font-size:.65rem;font-weight:600;color:var(--muted);margin-bottom:4px;letter-spacing:.4px;text-transform:uppercase}
input,textarea,select{width:100%;background:var(--bg4);border:1px solid var(--border2);border-radius:8px;color:var(--text);font-family:"Jost",sans-serif;font-size:.9rem;padding:9px 12px;outline:none;transition:border-color .15s}
input:focus,textarea:focus{border-color:var(--gold2)}
textarea{resize:vertical;min-height:64px}
.btn{display:flex;align-items:center;justify-content:center;width:100%;padding:12px;border-radius:var(--r);font-family:"Jost",sans-serif;font-size:.92rem;font-weight:500;cursor:pointer;border:none;transition:all .18s;margin-top:9px}
.btn-g{background:linear-gradient(135deg,var(--gold),var(--gold2));color:var(--bg)}
.btn-o{background:transparent;color:var(--text2);border:1px solid var(--border2)}
/* BLOCKS */
.bi{background:var(--bg2);border:1px solid var(--border);border-radius:11px;padding:13px 15px;margin-bottom:8px;transition:all .2s}
.bi.active{border-color:var(--gold2);background:rgba(201,168,76,.09);box-shadow:0 0 0 1px rgba(201,168,76,.18)}
.bi.done{opacity:.35;border-color:rgba(201,168,76,.05)}
.bi-time{font-family:"Cormorant Garamond",serif;font-size:.98rem;font-weight:600;color:var(--gold2);margin-bottom:2px;letter-spacing:.3px}
.bi.done .bi-time{color:var(--muted)}
.bi.active .bi-time{font-size:1.08rem;color:var(--gold3)}
.bi-title{font-size:.93rem;font-weight:500;color:var(--text);margin-bottom:2px}
.bi-speaker{font-size:.76rem;color:var(--muted)}
.badge{display:inline-flex;align-items:center;font-size:.68rem;font-weight:600;padding:2px 8px;border-radius:20px}
.b-live{background:rgba(78,203,141,.12);color:var(--success);border:1px solid rgba(78,203,141,.3)}
.b-open{background:rgba(201,168,76,.12);color:var(--gold2);border:1px solid var(--border2)}
.b-next{background:rgba(78,120,200,.1);color:#7aacf5;border:1px solid rgba(78,120,200,.2)}
.b-done{background:var(--bg3);color:var(--muted);border:1px solid var(--border)}
/* RATING */
.card{background:var(--bg2);border:1px solid var(--border);border-radius:11px;padding:14px;margin-bottom:11px}
.ct{font-family:"Cormorant Garamond",serif;font-size:1.1rem;font-weight:600;margin-bottom:2px}
.cs{font-size:.76rem;color:var(--muted)}
.fl{margin-bottom:12px}
.stars{display:flex;gap:6px;margin-top:4px}
.star{width:40px;height:40px;border-radius:7px;border:1px solid var(--border2);background:var(--bg3);display:flex;align-items:center;justify-content:center;font-size:18px;cursor:pointer;transition:all .15s;user-select:none}
.star.on{background:rgba(201,168,76,.18);border-color:var(--gold2)}
.chips{display:flex;flex-wrap:wrap;gap:5px;margin-top:4px}
.chip{font-size:.78rem;padding:5px 12px;border-radius:18px;border:1px solid var(--border2);background:var(--bg3);cursor:pointer;color:var(--text2);transition:all .15s;user-select:none}
.chip.on{background:rgba(201,168,76,.15);border-color:var(--gold2);color:var(--gold2)}
.tog-row{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border)}
.tog-row span{font-size:.84rem;color:var(--text2)}
.tw{position:relative;width:38px;height:21px;flex-shrink:0}
.tw input{opacity:0;width:0;height:0;position:absolute}
.ts{position:absolute;inset:0;background:var(--bg4);border-radius:11px;cursor:pointer;transition:.2s;border:1px solid var(--border2)}
.ts::before{content:"";position:absolute;width:15px;height:15px;left:2px;bottom:2px;background:#fff;border-radius:50%;transition:.2s}
.tw input:checked+.ts{background:var(--gold2);border-color:var(--gold)}
.tw input:checked+.ts::before{transform:translateX(17px)}
/* THANKS */
.thx{text-align:center;padding:26px 0}
.thx-ic{font-size:2.4rem;margin-bottom:9px}
.thx-tt{font-family:"Cormorant Garamond",serif;font-size:1.55rem;font-weight:600;margin-bottom:4px;color:var(--gold2)}
.thx-sub{font-size:.83rem;color:var(--muted);line-height:1.6}
.nbc{background:var(--bg3);border:1px solid var(--border2);border-radius:9px;padding:12px;margin:14px 0}
.nb-lbl{font-size:.65rem;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:3px}
.nb-t{font-size:.9rem;font-weight:500}
.nb-s{font-size:.76rem;color:var(--muted);margin-top:2px}
/* Q SCREEN */
.qs-card{background:var(--bg2);border:1px solid var(--border2);border-radius:13px;padding:18px 20px;margin-bottom:11px}
.qs-blk{font-size:.65rem;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:var(--gold);margin-bottom:6px}
.qs-txt{font-family:"Cormorant Garamond",serif;font-size:1.3rem;font-weight:600;line-height:1.4;color:var(--text)}
.qs-auth{font-size:.76rem;color:var(--muted);margin-top:6px}
.empty{text-align:center;padding:32px 16px;color:var(--muted);font-size:.84rem}
.sec-lbl{font-size:.65rem;font-weight:600;letter-spacing:1.8px;text-transform:uppercase;color:var(--gold);margin-bottom:9px}
.divider{height:1px;background:var(--border);margin:12px 0}
.toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(70px);background:var(--text);color:#fff;padding:9px 20px;border-radius:18px;font-size:.8rem;font-weight:500;z-index:999;transition:transform .22s;pointer-events:none;white-space:nowrap}
.toast.on{transform:translateX(-50%) translateY(0)}
</style>
</head>

</div>

<div class="toast" id="toast"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
import { getDatabase, ref, get, push, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

const FB = {
  apiKey:"AIzaSyC_NncsDb11L1Rawkc9fvAqZUjsG6jmNL4",
  authDomain:"eva-konference.firebaseapp.com",
  databaseURL:"https://eva-konference-default-rtdb.europe-west1.firebasedatabase.app",
  projectId:"eva-konference",
  storageBucket:"eva-konference.firebasestorage.app",
  messagingSenderId:"1086638566085",
  appId:"1:1086638566085:web:3ad722ad3d30e44563deac"
};

const app = initializeApp(FB);
const db = getDatabase(app);

// ── STATE ──
let P = JSON.parse(localStorage.getItem("eva_p")||"null");
let blocks = [];
let prevSnap = "";

// ── UTILS ──
const uid = ()=>Date.now().toString(36)+Math.random().toString(36).slice(2,6);
const esc = s=>String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
function toast(msg,dur=2800){
  const t=document.getElementById("toast");
  t.textContent=msg; t.classList.add("on");
  setTimeout(()=>t.classList.remove("on"),dur);
}

// ── CLOCK ──
function tick(){
  const t=new Date().toLocaleTimeString("cs",{hour:"2-digit",minute:"2-digit"});
  ["h-clk","qs-clk"].forEach(id=>{const e=document.getElementById(id);if(e)e.textContent=t;});
}
setInterval(tick,5000); tick();

// ── SCREENS ──
function show(id){
  document.querySelectorAll(".screen").forEach(s=>s.classList.remove("on"));
  document.getElementById(id).classList.add("on");
}

// ── TABS ──
function goTab(tab){
  document.getElementById("t-prog").classList.toggle("on",tab==="prog");
  document.getElementById("t-rate").classList.toggle("on",tab==="rate");
  document.getElementById("v-prog").style.display=tab==="prog"?"block":"none";
  document.getElementById("v-rate").style.display=tab==="rate"?"block":"none";
  if(tab==="rate") renderRating();
  if(tab==="prog") renderBlocks();
}
window.goTab=goTab;

// ── JOIN ──
document.getElementById("j-btn").onclick=()=>{
  const name=document.getElementById("j-name").value.trim();
  if(!name){toast("Zadejte prosím jméno");return;}
  P={id:uid(),name,rated:{},joinedAt:Date.now()};
  localStorage.setItem("eva_p",JSON.stringify(P));
  document.getElementById("h-name").textContent=name;
  show("s-main");
  renderBlocks();
};
document.getElementById("j-name").addEventListener("keydown",e=>{if(e.key==="Enter")document.getElementById("j-btn").click();});

// ── BACK BUTTONS ──
document.getElementById("thx-back").onclick=()=>{show("s-main");goTab("prog");};
document.getElementById("qs-back").onclick=()=>{show("s-main");goTab("prog");};

// ── BLOCKS ──
const BREAKS=["malá přestávka","velká přestávka","oběd"];

function renderBlocks(){
  if(!P) return;
  const el=document.getElementById("blocks-list");
  if(!blocks.length){el.innerHTML="<div class=\"empty\">Program se načítá…</div>";return;}
  el.innerHTML=blocks.map(b=>{
    const isBreak=BREAKS.includes(b.type);
    const rated=P.rated&&P.rated[b.id];
    const isActive=b.status==="open"||b.status==="live";
    const isDone=b.status==="done";
    const badge={done:`<span class="badge b-done">Dokončeno</span>`,open:`<span class="badge b-open">● Hodnocení otevřeno</span>`,live:`<span class="badge b-live">● Právě běží</span>`,next:`<span class="badge b-next">Připravuje se</span>`}[b.status]||"";
    const ratedBadge=rated?`<span class="badge b-done" style="margin-left:5px">✓ Hodnoceno</span>`:"";
    if(isBreak) return `<div class="bi" style="opacity:.4;border-style:dashed"><div class="bi-time">${b.start||""}${b.end?" – "+b.end:""} · ${b.type}</div><div class="bi-title" style="color:var(--muted)">${esc(b.title)}</div></div>`;
    const isProd=b.type==="produktová prezentace";
    const prodTag=isProd?`<span style="font-size:.62rem;padding:1px 7px;border-radius:9px;border:1px solid var(--gold2);color:var(--gold2);margin-right:4px">Produkt</span>`:"";
    const openBtn=(b.status==="open"&&!rated)?`<div style="margin-top:9px"><button class="btn btn-g" style="font-size:.8rem;padding:9px" onclick="openRate('${b.id}')">Ohodnotit →</button></div>`:"";
    return `<div class="bi ${isActive?"active":isDone?"done":""}">
      <div class="bi-time">${b.start||""}${b.end?" – "+b.end:""} · ${b.type||""}</div>
      <div class="bi-title">${prodTag}${esc(b.title)}</div>
      ${b.speaker?`<div class="bi-speaker">${esc(b.speaker)}</div>`:""}
      <div style="margin-top:5px;display:flex;flex-wrap:wrap;gap:5px">${badge}${ratedBadge}</div>
      ${openBtn}
    </div>`;
  }).join("");
}

window.openRate=(id)=>{goTab("rate");document.getElementById("rating-wrap")._blockId=id;renderRating(id);};

// ── RATING FORM ──
function renderRating(blockId){
  const wrap=document.getElementById("rating-wrap");
  const id=blockId||wrap._blockId||blocks.find(b=>b.status==="open")?.id;
  if(!id){wrap.innerHTML="<div class=\"empty\">Momentálně není otevřeno žádné hodnocení.</div>";return;}
  const b=blocks.find(x=>x.id===id);
  if(!b){wrap.innerHTML="<div class=\"empty\">Blok nenalezen.</div>";return;}
  if(P?.rated?.[id]){wrap.innerHTML=`<div class="thx"><div class="thx-ic">✓</div><div class="thx-tt">Již hodnoceno</div><div class="thx-sub">Tento blok jste již ohodnotili.</div></div>`;return;}
  wrap._blockId=id;
  const isProd=b.type==="produktová prezentace";
  wrap.innerHTML=`
    <div class="card" style="border-color:var(--gold2);background:rgba(201,168,76,.07)">
      <div style="margin-bottom:4px"><span style="font-size:.65rem;font-weight:600;padding:2px 8px;border-radius:9px;border:1px solid ${isProd?"var(--gold2)":"rgba(78,120,200,.6)"};color:${isProd?"var(--gold2)":"#7aacf5"}">${isProd?"Produktová prezentace":"Přednáška"}</span></div>
      <div class="ct">${esc(b.title)}</div>
      <div class="cs">${esc(b.speaker||"")}${b.start?" · "+b.start:""}</div>
    </div>
    <div class="fl"><label class="lbl">Celkové hodnocení</label><div class="stars" id="st-ov" data-v="0"></div></div>
    <div class="fl"><label class="lbl">Srozumitelnost</label><div class="stars" id="st-cl" data-v="0"></div></div>
    <div class="fl"><label class="lbl">Co si odnášíte?</label>
      <div class="chips" id="ch-tak">
        <div class="chip" onclick="tog(this)">Novou informaci</div>
        <div class="chip" onclick="tog(this)">Chci zjistit víc</div>
        <div class="chip" onclick="tog(this)">Lepší porozumění</div>
        <div class="chip" onclick="tog(this)">Zatím nevím</div>
      </div>
    </div>
    <div class="fl"><label class="lbl">Relevance tématu</label>
      <div class="chips" id="ch-rel">
        <div class="chip" onclick="one(this,'ch-rel')">Velmi</div>
        <div class="chip" onclick="one(this,'ch-rel')">Částečně</div>
        <div class="chip" onclick="one(this,'ch-rel')">Spíš ne</div>
      </div>
    </div>
    <div class="tog-row"><span>Zájem o více informací</span><label class="tw"><input type="checkbox" id="tog-mi"><div class="ts"></div></label></div>
    ${isProd?`
    <div style="padding-top:12px;border-top:1px solid var(--border);margin-top:4px">
      <div class="sec-lbl">Investiční záměr</div>
      <div class="fl"><label class="lbl">Uvažuji o koupi</label><div class="stars" id="st-buy" data-v="0"></div></div>
      <div class="fl"><label class="lbl">Kdy?</label><div class="chips" id="ch-when"><div class="chip" onclick="one(this,'ch-when')">Ihned</div><div class="chip" onclick="one(this,'ch-when')">Do 3 měsíců</div><div class="chip" onclick="one(this,'ch-when')">Do 6 měsíců</div><div class="chip" onclick="one(this,'ch-when')">Později</div></div></div>
      <div class="fl"><label class="lbl">Objem (USDC) — nepovinné</label><input type="text" id="inp-usd" placeholder="Např. 5000"></div>
    </div>`:""}
    <div class="fl" style="margin-top:4px"><label class="lbl">Otázka / vzkaz pro řečníka — nepovinné</label><textarea id="inp-q" placeholder="Vaše otázka…"></textarea></div>
    <button class="btn btn-g" id="r-submit">Odeslat hodnocení →</button>
  `;
  mkStars("st-ov"); mkStars("st-cl");
  if(isProd) mkStars("st-buy");
  document.getElementById("r-submit").onclick=()=>submitRating(id,isProd);
}

function mkStars(id){
  const c=document.getElementById(id); if(!c) return;
  c.innerHTML=[1,2,3,4,5].map(i=>`<div class="star" onclick="setStar('${id}',${i})">★</div>`).join("");
}
window.setStar=(id,v)=>{
  const c=document.getElementById(id);if(!c)return;
  c.dataset.v=v;
  c.querySelectorAll(".star").forEach((s,i)=>s.classList.toggle("on",i<v));
};
window.tog=(el)=>el.classList.toggle("on");
window.one=(el,gid)=>{document.querySelectorAll("#"+gid+" .chip").forEach(c=>c.classList.remove("on"));el.classList.add("on");};

async function submitRating(id,isProd){
  const ov=parseInt(document.getElementById("st-ov")?.dataset.v)||0;
  if(!ov){toast("Zadejte prosím celkové hodnocení");return;}
  const b=blocks.find(x=>x.id===id);
  const resp={
    blockId:id, blockType:b?.type||"přednáška", blockTitle:b?.title||"",
    participantId:P.id, participantName:P.name,
    overall:ov,
    clarity:parseInt(document.getElementById("st-cl")?.dataset.v)||0,
    takeaway:[...document.querySelectorAll("#ch-tak .chip.on")].map(c=>c.textContent).join(", "),
    relevance:document.querySelector("#ch-rel .chip.on")?.textContent||"",
    moreInfo:document.getElementById("tog-mi")?.checked||false,
    buyRating:isProd?parseInt(document.getElementById("st-buy")?.dataset.v)||0:null,
    buyWhen:isProd?document.querySelector("#ch-when .chip.on")?.textContent||"":null,
    buyAmount:isProd?document.getElementById("inp-usd")?.value.trim()||"":null,
    time:new Date().toLocaleTimeString("cs",{hour:"2-digit",minute:"2-digit"}),
    createdAt:Date.now()
  };
  await push(ref(db,"responses"),resp);
  const q=document.getElementById("inp-q")?.value.trim()||"";
  if(q) await push(ref(db,"questions"),{blockId:id,blockTitle:b?.title||"",text:q,author:P.name,status:"new",time:resp.time,note:"",createdAt:Date.now()});
  P.rated=P.rated||{};
  P.rated[id]=true;
  localStorage.setItem("eva_p",JSON.stringify(P));
  // Show thanks
  const sorted=blocks.filter(b=>!BREAKS.includes(b.type));
  const idx=sorted.findIndex(x=>x.id===id);
  const next=sorted.slice(idx+1).find(x=>x.status==="next"||x.status==="live");
  const nb=document.getElementById("thx-next");
  if(next){nb.innerHTML=`<div class="nb-lbl">Další blok</div><div class="nb-t">${esc(next.title)}</div><div class="nb-s">${next.start||""}${next.speaker?" · "+esc(next.speaker):""}</div>`;nb.style.display="block";}
  else nb.style.display="none";
  show("s-thx");
}

// ── FIREBASE REAL-TIME ──
onValue(ref(db,"settings"),snap=>{
  if(!snap.exists()) return;
  const s=snap.val();
  document.getElementById("j-ev").textContent=s.name+(s.place?" · "+s.place:"");
  document.getElementById("j-sub").textContent=s.desc||"portal-eva.com";
});

onValue(ref(db,"blocks"),snap=>{
  const raw=snap.val()||{};
  const newBlocks=Object.entries(raw).map(([id,b])=>({...b,id})).sort((a,b)=>a.order-b.order);
  const newSnap=JSON.stringify(newBlocks.map(b=>({id:b.id,status:b.status})));

  if(prevSnap && newSnap!==prevSnap){
    const justOpened=newBlocks.find(nb=>{const ob=blocks.find(b=>b.id===nb.id);return ob&&ob.status!=="open"&&nb.status==="open";});
    const justClosed=newBlocks.find(nb=>{const ob=blocks.find(b=>b.id===nb.id);return ob&&ob.status!=="done"&&nb.status==="done";});
    const justLive=newBlocks.find(nb=>{const ob=blocks.find(b=>b.id===nb.id);return ob&&ob.status!=="live"&&nb.status==="live";});

    if((justOpened||justClosed||justLive) && P){
      // Přepni na Program obrazovku a záložku
      show("s-main");
      goTab("prog");
      setTimeout(()=>{
        const el=document.querySelector(".bi.active");
        if(el) el.scrollIntoView({behavior:"smooth",block:"center"});
      },300);
      if(justOpened && !P.rated?.[justOpened.id]) toast("● "+justOpened.title+" — hodnoťte nyní",4000);
      if(justLive) toast("Probíhá: "+justLive.title,3000);
    }
  }

  prevSnap=newSnap;
  blocks=newBlocks;
  renderBlocks();
});

onValue(ref(db,"command"),snap=>{
  if(!snap.exists()) return;
  const cmd=snap.val();
  if(!cmd||!cmd.action) return;
  if(cmd.action==="show_questions"){
    get(ref(db,"questions")).then(s=>{
      const all=s.val()||{};
      const qs=Object.values(all).filter(q=>q.status==="approved"&&(cmd.mode==="all"||q.blockId===cmd.blockId));
      document.getElementById("qs-title").textContent=cmd.mode==="all"?"Otázky z celé konference":"Otázky";
      const el=document.getElementById("qs-list");
      el.innerHTML=qs.length?qs.map(q=>`<div class="qs-card"><div class="qs-blk">${esc(q.blockTitle)} · ${q.time||""}</div><div class="qs-txt">${esc(q.text)}</div></div>`).join(""):"<div class=\"empty\">Žádné schválené otázky.</div>";
      show("s-qs");
    });
  }
  if(cmd.action==="show_final") renderFinal();
});

// ── FINAL FORM ──
function renderFinal(){
  show("s-fin");
  if(P?.finalDone){document.getElementById("fin-wrap").innerHTML=`<div class="thx"><div class="thx-ic">✓</div><div class="thx-tt">Závěr odeslán</div><div class="thx-sub">Děkujeme za účast!</div></div>`;return;}
  const sorted=blocks.filter(b=>!BREAKS.includes(b.type));
  document.getElementById("fin-wrap").innerHTML=`
    <div style="text-align:center;padding:16px 0 12px">
      <div style="font-family:'Cormorant Garamond',serif;font-size:1.65rem;font-weight:600;color:var(--gold2)">Závěrečné hodnocení</div>
      <div style="font-size:.8rem;color:var(--muted);margin-top:3px">Jak hodnotíte celý den?</div>
    </div>
    <div class="fl"><label class="lbl">Nejpřínosnější blok</label>
      <select id="fin-best" style="margin-top:4px"><option value="">— vyberte —</option>${sorted.map(b=>`<option value="${b.id}">${esc(b.title)}</option>`).join("")}</select>
    </div>
    <div class="fl"><label class="lbl">Organizace akce</label><div class="stars" id="st-org" data-v="0"></div></div>
    <div class="fl"><label class="lbl">Atmosféra</label><div class="stars" id="st-atm" data-v="0"></div></div>
    <div class="fl"><label class="lbl">Témata zájmu do budoucna</label>
      <div class="chips" id="ch-fut">
        <div class="chip" onclick="tog(this)">Investice do nemovitostí</div>
        <div class="chip" onclick="tog(this)">Alternativní investice</div>
        <div class="chip" onclick="tog(this)">Daňová optimalizace</div>
        <div class="chip" onclick="tog(this)">Produkty EVA</div>
        <div class="chip" onclick="tog(this)">Individuální konzultace</div>
      </div>
    </div>
    <div class="fl"><label class="lbl">Investiční horizont</label>
      <div class="chips" id="ch-hor">
        <div class="chip" onclick="one(this,'ch-hor')">Ihned</div>
        <div class="chip" onclick="one(this,'ch-hor')">Do 3 měsíců</div>
        <div class="chip" onclick="one(this,'ch-hor')">Do 6 měsíců</div>
        <div class="chip" onclick="one(this,'ch-hor')">Později</div>
      </div>
    </div>
    <div class="fl"><label class="lbl">Co zlepšit — nepovinné</label><textarea id="fin-imp" placeholder="Vaše poznámka…"></textarea></div>
    <button class="btn btn-g" id="fin-btn">Odeslat →</button>
    <div style="font-size:.7rem;color:var(--muted);text-align:center;margin-top:7px">Poté budete mít možnost zanechat kontakt.</div>
  `;
  mkStars("st-org"); mkStars("st-atm");
  document.getElementById("fin-btn").onclick=submitFinal;
}

async function submitFinal(){
  const org=parseInt(document.getElementById("st-org")?.dataset.v)||0;
  if(!org){toast("Ohodnoťte prosím organizaci");return;}
  await push(ref(db,"final_surveys"),{
    participantId:P.id,participantName:P.name,
    orgRating:org,atmRating:parseInt(document.getElementById("st-atm")?.dataset.v)||0,
    future:[...document.querySelectorAll("#ch-fut .chip.on")].map(c=>c.textContent).join(", "),
    horizon:document.querySelector("#ch-hor .chip.on")?.textContent||"",
    improve:document.getElementById("fin-imp")?.value.trim()||"",
    bestBlock:document.getElementById("fin-best")?.value||"",
    createdAt:Date.now()
  });
  P.finalDone=true;
  localStorage.setItem("eva_p",JSON.stringify(P));
  showLead();
}

function showLead(){
  document.getElementById("fin-wrap").innerHTML=`
    <div style="text-align:center;padding:14px 0 10px">
      <div style="font-size:1.8rem;margin-bottom:6px">✓</div>
      <div style="font-family:'Cormorant Garamond',serif;font-size:1.35rem;font-weight:600;color:var(--gold2)">Hodnocení odesláno!</div>
      <div style="font-size:.8rem;color:var(--muted);margin-top:3px">Chcete zanechat kontakt? Je to zcela dobrovolné.</div>
    </div>
    <div style="background:var(--bg2);border:1px solid var(--border2);border-radius:11px;padding:15px;margin-bottom:13px">
      <div class="sec-lbl" style="margin-bottom:11px">Dobrovolný kontakt</div>
      <div class="fl"><label class="lbl">Jméno</label><input type="text" id="l-name" value="${esc(P?.name||"")}"></div>
      <div class="fl"><label class="lbl">E-mail</label><input type="email" id="l-email" placeholder="vas@email.cz"></div>
      <div class="fl"><label class="lbl">Telefon — nepovinné</label><input type="text" id="l-phone" placeholder="+420 …"></div>
      <div class="fl"><label class="lbl">Téma zájmu</label>
        <div class="chips" id="ch-ltop">
          <div class="chip" onclick="tog(this)">Investice do nemovitostí</div>
          <div class="chip" onclick="tog(this)">Produkty EVA</div>
          <div class="chip" onclick="tog(this)">Alternativní investice</div>
          <div class="chip" onclick="tog(this)">Individuální konzultace</div>
        </div>
      </div>
      <div class="fl"><label class="lbl">Poznámka — nepovinné</label><textarea id="l-note" placeholder="Cokoliv chcete dodat…"></textarea></div>
      <div class="tog-row"><span>Souhlasím s kontaktováním ze strany EVA</span><label class="tw"><input type="checkbox" id="l-con"><div class="ts"></div></label></div>
    </div>
    <button class="btn btn-g" id="l-btn">Zanechat kontakt →</button>
    <button class="btn btn-o" id="l-skip" style="margin-top:6px">Přeskočit</button>
  `;
  document.getElementById("l-btn").onclick=submitLead;
  document.getElementById("l-skip").onclick=leadThanks;
}

async function submitLead(){
  const name=document.getElementById("l-name")?.value.trim();
  const email=document.getElementById("l-email")?.value.trim();
  if(!name){toast("Zadejte jméno");return;}
  if(!email){toast("Zadejte e-mail");return;}
  const consent=document.getElementById("l-con")?.checked||false;
  await push(ref(db,"leads"),{
    participantId:P.id,name,email,
    phone:document.getElementById("l-phone")?.value.trim()||"",
    topic:[...document.querySelectorAll("#ch-ltop .chip.on")].map(c=>c.textContent).join(", "),
    note:document.getElementById("l-note")?.value.trim()||"",
    consent,consentAt:consent?new Date().toISOString():null,
    createdAt:Date.now()
  });
  leadThanks();
}

function leadThanks(){
  document.getElementById("fin-wrap").innerHTML=`
    <div class="thx">
      <div class="thx-ic">◆</div>
      <div class="thx-tt">Děkujeme za účast!</div>
      <div class="thx-sub">Těšíme se na vás na příštím EVA eventu.</div>
    </div>
    <div style="text-align:center;font-size:.78rem;color:var(--muted);margin-top:14px">portal-eva.com</div>
  `;
}

// ── INIT ──
if(P){
  document.getElementById("h-name").textContent=P.name;
  show("s-main");
}
</script>
</body>
</html>
