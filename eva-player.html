<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>EVA Konference</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#09090f;--bg2:#0e0e17;--bg3:#13131f;--bg4:#1a1a28;
  --gold:#c9a84c;--gold2:#e8c97a;--gold3:#f5e0a0;
  --border:rgba(201,168,76,.12);--border2:rgba(201,168,76,.25);--border3:rgba(201,168,76,.45);
  --text:#eeeef5;--text2:#b8b8cc;--muted:#6a6a88;
  --danger:#e05555;--success:#4ecb8d;--r:10px;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:'Jost',sans-serif;background:var(--bg);color:var(--text)}
body{display:flex;flex-direction:column}
body::after{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;background:radial-gradient(ellipse 60% 40% at 50% 20%,rgba(201,168,76,.07) 0%,transparent 65%)}
header{display:flex;align-items:center;gap:12px;padding:10px 18px;border-bottom:1px solid var(--border2);background:var(--bg2);flex-shrink:0;position:sticky;top:0;z-index:100}
.logo{height:28px;width:auto}
.hdr-div{width:1px;height:20px;background:var(--border2)}
.hdr-name{font-size:.8rem;color:var(--muted)}
.hdr-right{margin-left:auto;display:flex;gap:8px;align-items:center}
.live-dot{width:7px;height:7px;border-radius:50%;background:var(--success);animation:pulse 1.8s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.live-clock{font-family:'Cormorant Garamond',serif;font-size:1rem;font-weight:600;color:var(--gold2);letter-spacing:2px}
.tab-bar{display:flex;border-bottom:1px solid var(--border);background:var(--bg2);padding:0 16px;flex-shrink:0}
.tab{padding:11px 16px;font-size:.82rem;font-weight:500;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;transition:all .15s;white-space:nowrap}
.tab.active{color:var(--gold);border-bottom-color:var(--gold)}
.main{flex:1;overflow-y:auto;padding:18px 16px;max-width:500px;margin:0 auto;width:100%}
.screen{display:none;flex-direction:column;flex:1;overflow:hidden}
.screen.active{display:flex}
/* JOIN */
.join-wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1;padding:30px 20px;text-align:center;position:relative}
.join-logo-img{height:64px;width:auto;margin-bottom:10px}
.join-sub{font-size:.85rem;color:var(--muted);margin-bottom:28px}
.join-card{width:100%;max-width:340px;background:var(--bg2);border:1px solid var(--border2);border-radius:16px;padding:26px 22px}
.join-event{font-size:.75rem;color:var(--muted);background:var(--bg3);border-radius:8px;padding:7px 12px;margin-bottom:16px;border:1px solid var(--border);text-align:center}
.field label{display:block;font-size:.68rem;font-weight:600;color:var(--muted);margin-bottom:5px;letter-spacing:.5px;text-transform:uppercase}
input[type=text],input[type=email],textarea,select{width:100%;background:var(--bg4);border:1px solid var(--border2);border-radius:8px;color:var(--text);font-family:'Jost',sans-serif;font-size:.9rem;padding:10px 13px;outline:none;transition:border-color .15s}
input[type=text]:focus,input[type=email]:focus,textarea:focus{border-color:var(--gold2)}
textarea{resize:vertical;min-height:68px}
.btn{display:flex;align-items:center;justify-content:center;width:100%;padding:13px;border-radius:var(--r);font-family:'Jost',sans-serif;font-size:.95rem;font-weight:500;cursor:pointer;border:none;transition:all .18s;margin-top:10px}
.btn-primary{background:linear-gradient(135deg,var(--gold),var(--gold2));color:var(--bg)}
.btn-primary:hover{filter:brightness(1.08)}
.btn-outline{background:transparent;color:var(--text2);border:1px solid var(--border2)}
.btn-outline:hover{border-color:var(--border3)}
.btn-sm{padding:7px 14px;font-size:.8rem;width:auto;margin-top:0}
/* BLOCKS */
.block-item{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:14px 16px;margin-bottom:9px;transition:all .2s}
.block-item.active-block{border-color:var(--gold2);background:rgba(201,168,76,.09);box-shadow:0 0 0 1px rgba(201,168,76,.2)}
.block-item.done-block{opacity:.35;border-color:rgba(201,168,76,.05)}
.bi-time{font-family:'Cormorant Garamond',serif;font-size:1rem;font-weight:600;color:var(--gold2);margin-bottom:3px;letter-spacing:.3px}
.block-item.done-block .bi-time{color:var(--muted)}
.block-item.active-block .bi-time{font-size:1.1rem;color:var(--gold3)}
.bi-title{font-size:.95rem;font-weight:500;color:var(--text);margin-bottom:2px}
.bi-speaker{font-size:.78rem;color:var(--muted)}
.bi-actions{margin-top:10px}
/* BADGES */
.badge{display:inline-flex;align-items:center;gap:4px;font-size:.7rem;font-weight:600;padding:3px 9px;border-radius:20px}
.badge-live{background:rgba(78,203,141,.12);color:var(--success);border:1px solid rgba(78,203,141,.3)}
.badge-open{background:rgba(201,168,76,.12);color:var(--gold2);border:1px solid var(--border2)}
.badge-next{background:rgba(78,120,200,.1);color:#7aacf5;border:1px solid rgba(78,120,200,.25)}
.badge-done{background:var(--bg3);color:var(--muted);border:1px solid var(--border)}
/* RATING FORM */
.card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:16px;margin-bottom:12px}
.card-title{font-family:'Cormorant Garamond',serif;font-size:1.15rem;font-weight:600;color:var(--text);margin-bottom:3px}
.card-sub{font-size:.78rem;color:var(--muted)}
.field{margin-bottom:13px}
.field label{display:block;font-size:.68rem;font-weight:600;color:var(--muted);margin-bottom:6px;letter-spacing:.4px;text-transform:uppercase}
.star-row{display:flex;gap:7px;margin-top:4px}
.star{width:42px;height:42px;border-radius:8px;border:1px solid var(--border2);background:var(--bg3);display:flex;align-items:center;justify-content:center;font-size:19px;cursor:pointer;transition:all .15s;user-select:none}
.star.on{background:rgba(201,168,76,.18);border-color:var(--gold2)}
.chips{display:flex;flex-wrap:wrap;gap:6px;margin-top:4px}
.chip{font-size:.8rem;padding:6px 13px;border-radius:20px;border:1px solid var(--border2);background:var(--bg3);cursor:pointer;color:var(--text2);transition:all .15s;user-select:none}
.chip.on{background:rgba(201,168,76,.15);border-color:var(--gold2);color:var(--gold2)}
.toggle-row{display:flex;align-items:center;justify-content:space-between;padding:11px 0;border-bottom:1px solid var(--border)}
.toggle-row span{font-size:.86rem;color:var(--text2)}
.toggle-wrap{position:relative;width:40px;height:22px;flex-shrink:0}
.toggle-wrap input{opacity:0;width:0;height:0;position:absolute}
.toggle-slider{position:absolute;inset:0;background:var(--bg4);border-radius:11px;cursor:pointer;transition:.2s;border:1px solid var(--border2)}
.toggle-slider::before{content:'';position:absolute;width:16px;height:16px;left:2px;bottom:2px;background:#fff;border-radius:50%;transition:.2s}
.toggle-wrap input:checked+.toggle-slider{background:var(--gold2);border-color:var(--gold)}
.toggle-wrap input:checked+.toggle-slider::before{transform:translateX(18px)}
/* THANKS */
.thanks-wrap{text-align:center;padding:28px 0}
.thanks-icon{font-size:2.6rem;margin-bottom:10px}
.thanks-title{font-family:'Cormorant Garamond',serif;font-size:1.6rem;font-weight:600;margin-bottom:5px;color:var(--gold2)}
.thanks-sub{font-size:.85rem;color:var(--muted);line-height:1.6}
.next-block-card{background:var(--bg3);border:1px solid var(--border2);border-radius:10px;padding:13px;margin:16px 0;text-align:left}
.nb-label{font-size:.68rem;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:3px}
.nb-title{font-size:.92rem;font-weight:500}
.nb-time{font-size:.78rem;color:var(--muted);margin-top:2px}
/* QUESTIONS SCREEN */
.q-screen-item{background:var(--bg2);border:1px solid var(--border2);border-radius:14px;padding:18px 22px;margin-bottom:12px}
.q-screen-block{font-size:.68rem;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:var(--gold);margin-bottom:8px}
.q-screen-text{font-family:'Cormorant Garamond',serif;font-size:1.35rem;font-weight:600;line-height:1.4;color:var(--text)}
.q-screen-author{font-size:.78rem;color:var(--muted);margin-top:7px}
/* TOAST */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--text);color:#fff;padding:10px 22px;border-radius:20px;font-size:.82rem;font-weight:500;z-index:999;transition:transform .25s;pointer-events:none;white-space:nowrap}
.toast.show{transform:translateX(-50%) translateY(0)}
.divider{height:1px;background:var(--border);margin:14px 0}
.empty{text-align:center;padding:36px 20px;color:var(--muted);font-size:.86rem}
.section-label{font-size:.68rem;font-weight:600;letter-spacing:1.8px;text-transform:uppercase;color:var(--gold);margin-bottom:10px}
</style>
</head>

  <div class="main" style="overflow-y:auto" id="final-wrap"></div>
</div>

<div class="toast" id="toast"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
import { getDatabase, ref, get, set, push, onValue, update } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

const FIREBASE_CONFIG = {
  apiKey: "AIzaSyC_NncsDb11L1Rawkc9fvAqZUjsG6jmNL4",
  authDomain: "eva-konference.firebaseapp.com",
  databaseURL: "https://eva-konference-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "eva-konference",
  storageBucket: "eva-konference.firebasestorage.app",
  messagingSenderId: "1086638566085",
  appId: "1:1086638566085:web:3ad722ad3d30e44563deac"
};

const app = initializeApp(FIREBASE_CONFIG);
const db = getDatabase(app);

// ── STATE ──
let participant = JSON.parse(localStorage.getItem('eva_participant')||'null');
let blocks = [];
let settings = {name:'EVA Konference', place:''};
let currentRatingBlockId = null;

// ── UTILS ──
function uid(){ return Date.now().toString(36)+Math.random().toString(36).slice(2,6); }
function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function toast(msg, dur=2500){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),dur);
}
function showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}
function switchTab(tab){
  document.getElementById('tab-program').classList.toggle('active', tab==='program');
  document.getElementById('tab-rating').classList.toggle('active', tab==='rating');
  document.getElementById('tab-program-content').style.display = tab==='program'?'block':'none';
  document.getElementById('tab-rating-content').style.display = tab==='rating'?'block':'none';
  if(tab==='rating') renderRatingForm();
}

// ── CLOCK ──
function updateClock(){
  const t = new Date().toLocaleTimeString('cs',{hour:'2-digit',minute:'2-digit'});
  ['player-clock','q-clock'].forEach(id=>{ const el=document.getElementById(id); if(el) el.textContent=t; });
}
setInterval(updateClock, 5000); updateClock();

// ── FIREBASE LISTENERS ──
function startListening(){
  // Settings
  onValue(ref(db,'settings'), snap=>{
    if(snap.exists()){
      settings = snap.val();
      document.getElementById('join-event-name').textContent = settings.name + (settings.place?' · '+settings.place:'');
      document.getElementById('join-sub').textContent = settings.desc||'portal-eva.com';
    }
  });

  // Blocks — live updates
  onValue(ref(db,'blocks'), snap=>{
    const data = snap.val()||{};
    blocks = Object.entries(data).map(([id,b])=>({...b,id})).sort((a,b)=>a.order-b.order);
    renderBlocks();
    checkAdminCommands();
  });

  // Admin commands (show questions, show final form)
  onValue(ref(db,'command'), snap=>{
    if(!snap.exists()) return;
    const cmd = snap.val();
    if(!cmd || !cmd.action) return;
    if(cmd.action==='show_questions'){
      renderQuestionsScreen(cmd.blockId||null, cmd.mode||'all');
      showScreen('scr-questions');
    }
    if(cmd.action==='show_final'){
      renderFinalForm();
      showScreen('scr-final');
    }
  });
}

function checkAdminCommands(){
  // Also re-render rating if open block changed
  const openBlock = blocks.find(b=>b.status==='open');
  if(openBlock) currentRatingBlockId = openBlock.id;
}

// ── JOIN ──
function doJoin(){
  const name = document.getElementById('inp-name').value.trim();
  if(!name){ toast('Zadejte prosím jméno'); return; }
  participant = {id:uid(), name, rated:{}, joinedAt:Date.now()};
  localStorage.setItem('eva_participant', JSON.stringify(participant));
  document.getElementById('hdr-name').textContent = name;
  showScreen('scr-main');
  renderBlocks();
  toast('Vítejte, '+name+'!');
}
window.doJoin = doJoin;

// ── BLOCKS LIST ──
function renderBlocks(){
  if(!participant) return;
  const BREAK_TYPES = ['malá přestávka','velká přestávka','oběd'];
  const el = document.getElementById('blocks-list');
  if(!blocks.length){ el.innerHTML='<div class="empty">Program se načítá…</div>'; return; }
  el.innerHTML = blocks.map(b=>{
    const isBreak = BREAK_TYPES.includes(b.type);
    const rated = participant.rated && participant.rated[b.id];
    const isOpen = b.status==='open';
    const isActive = b.status==='live'||b.status==='open';
    const isDone = b.status==='done';
    const badge = {
      done:`<span class="badge badge-done">Dokončeno</span>`,
      open:`<span class="badge badge-open">● Hodnocení otevřeno</span>`,
      live:`<span class="badge badge-live">● Právě běží</span>`,
      next:`<span class="badge badge-next">Připravuje se</span>`,
    }[b.status]||'';
    const ratedBadge = rated?`<span class="badge badge-done" style="margin-left:5px">✓ Hodnoceno</span>`:'';
    if(isBreak) return `<div class="block-item" style="opacity:.4;border-style:dashed">
      <div class="bi-time">${b.start||''}${b.end?' – '+b.end:''} · ${b.type}</div>
      <div class="bi-title" style="color:var(--muted)">${b.title}</div>
    </div>`;
    const isProd = b.type==='produktová prezentace';
    const prodBadge = isProd?`<span style="font-size:.65rem;padding:1px 7px;border-radius:10px;border:1px solid var(--gold2);color:var(--gold2);margin-right:5px">Produkt</span>`:'';
    return `<div class="block-item ${isActive?'active-block':isDone?'done-block':''}">
      <div class="bi-time">${b.start||''}${b.end?' – '+b.end:''} · ${b.type||''}</div>
      <div class="bi-title">${prodBadge}${esc(b.title)}</div>
      ${b.speaker?`<div class="bi-speaker">${esc(b.speaker)}</div>`:''}
      <div style="margin-top:6px;display:flex;flex-wrap:wrap;gap:5px">${badge}${ratedBadge}</div>
      ${(isOpen&&!rated)?`<div class="bi-actions"><button class="btn btn-primary" style="font-size:.82rem;padding:9px" onclick="openRating('${b.id}')">Ohodnotit →</button></div>`:''}
    </div>`;
  }).join('');
}
window.openRating = (blockId)=>{ switchTab('rating'); currentRatingBlockId=blockId; renderRatingForm(); };

// ── RATING FORM ──
function renderRatingForm(){
  const wrap = document.getElementById('rating-form');
  const blockId = currentRatingBlockId || blocks.find(b=>b.status==='open')?.id;
  if(!blockId){ wrap.innerHTML='<div class="empty">Momentálně není otevřeno žádné hodnocení.</div>'; return; }
  const block = blocks.find(b=>b.id===blockId);
  if(!block){ wrap.innerHTML='<div class="empty">Blok nenalezen.</div>'; return; }
  if(participant?.rated?.[blockId]){
    wrap.innerHTML=`<div class="thanks-wrap"><div class="thanks-icon">✓</div><div class="thanks-title">Již hodnoceno</div><div class="thanks-sub">Tento blok jste již ohodnotili.</div></div>`;
    return;
  }
  currentRatingBlockId = blockId;
  const isProd = block.type==='produktová prezentace';
  const typeColor = isProd?'var(--gold2)':'rgba(78,120,200,.8)';
  wrap.innerHTML = `
    <div class="card" style="border-color:var(--gold2);background:rgba(201,168,76,.07)">
      <div style="margin-bottom:5px"><span style="font-size:.68rem;font-weight:600;padding:2px 9px;border-radius:10px;border:1px solid;border-color:${typeColor};color:${typeColor}">${isProd?'Produktová prezentace':'Přednáška'}</span></div>
      <div class="card-title">${esc(block.title)}</div>
      <div class="card-sub">${esc(block.speaker||'')}${block.start?' · '+block.start:''}</div>
    </div>
    <div class="field"><label>Celkové hodnocení</label><div class="star-row" id="stars-overall" data-val="0"></div></div>
    <div class="field"><label>Srozumitelnost</label><div class="star-row" id="stars-clarity" data-val="0"></div></div>
    <div class="field">
      <label>Co si odnášíte?</label>
      <div class="chips" id="chips-takeaway">
        <div class="chip" onclick="chipToggle(this)">Novou informaci</div>
        <div class="chip" onclick="chipToggle(this)">Chci zjistit víc</div>
        <div class="chip" onclick="chipToggle(this)">Lepší porozumění</div>
        <div class="chip" onclick="chipToggle(this)">Zatím nevím</div>
      </div>
    </div>
    <div class="field">
      <label>Relevance tématu pro vás</label>
      <div class="chips" id="chips-relevance">
        <div class="chip" onclick="chipSingle(this,'relevance')">Velmi</div>
        <div class="chip" onclick="chipSingle(this,'relevance')">Částečně</div>
        <div class="chip" onclick="chipSingle(this,'relevance')">Spíš ne</div>
      </div>
    </div>
    <div class="toggle-row"><span>Zájem o více informací</span><label class="toggle-wrap"><input type="checkbox" id="tog-more"><div class="toggle-slider"></div></label></div>
    ${isProd?`
    <div style="margin-top:4px;padding-top:14px;border-top:1px solid var(--border)">
      <div class="section-label">Investiční záměr</div>
      <div class="field"><label>Uvažuji o koupi</label><div class="star-row" id="stars-buy" data-val="0"></div><div style="display:flex;justify-content:space-between;font-size:.68rem;color:var(--muted);margin-top:4px;padding:0 3px"><span>Vůbec ne</span><span>Rozhodně ano</span></div></div>
      <div class="field"><label>Kdy?</label><div class="chips" id="chips-when"><div class="chip" onclick="chipSingle(this,'when')">Ihned</div><div class="chip" onclick="chipSingle(this,'when')">Do 3 měsíců</div><div class="chip" onclick="chipSingle(this,'when')">Do roka</div><div class="chip" onclick="chipSingle(this,'when')">Zatím ne</div></div></div>
      <div class="field"><label>Objem investice (USDC) <span style="text-transform:none;font-weight:400;color:var(--muted)">(nepovinné)</span></label><input type="text" id="inp-amount" placeholder="Např. 5000" style="letter-spacing:0"></div>
    </div>`:''}
    <div class="field" style="margin-top:4px">
      <label>Otázka / vzkaz pro řečníka <span style="text-transform:none;font-weight:400;color:var(--muted)">(nepovinné)</span></label>
      <textarea id="inp-question" placeholder="Vaše otázka…"></textarea>
    </div>
    <div style="height:14px"></div>
    <button class="btn btn-primary" onclick="submitRating()">Odeslat hodnocení →</button>
  `;
  renderStars('stars-overall'); renderStars('stars-clarity');
  if(isProd) renderStars('stars-buy');
}

function renderStars(id){
  const c=document.getElementById(id); if(!c) return;
  c.innerHTML=[1,2,3,4,5].map(i=>`<div class="star" onclick="setStar('${id}',${i})">★</div>`).join('');
}
window.renderStars=renderStars;

window.setStar=(id,val)=>{
  const c=document.getElementById(id); if(!c) return;
  c.dataset.val=val;
  c.querySelectorAll('.star').forEach((s,i)=>s.classList.toggle('on',i<val));
};
window.chipToggle=(el)=>el.classList.toggle('on');
window.chipSingle=(el,group)=>{
  document.querySelectorAll('#chips-'+group+' .chip').forEach(c=>c.classList.remove('on'));
  el.classList.add('on');
};

async function submitRating(){
  const overall=parseInt(document.getElementById('stars-overall')?.dataset.val)||0;
  const clarity=parseInt(document.getElementById('stars-clarity')?.dataset.val)||0;
  if(!overall){ toast('Zadejte prosím celkové hodnocení'); return; }
  const block=blocks.find(b=>b.id===currentRatingBlockId);
  const isProd=block?.type==='produktová prezentace';
  const takeaway=[...document.querySelectorAll('#chips-takeaway .chip.on')].map(c=>c.textContent).join(', ');
  const relevance=document.querySelector('#chips-relevance .chip.on')?.textContent||'';
  const question=document.getElementById('inp-question')?.value.trim()||'';
  const moreInfo=document.getElementById('tog-more')?.checked||false;
  const buyRating=isProd?parseInt(document.getElementById('stars-buy')?.dataset.val)||0:null;
  const buyWhen=isProd?document.querySelector('#chips-when .chip.on')?.textContent||'':null;
  const buyAmount=isProd?document.getElementById('inp-amount')?.value.trim()||'':null;
  const time=new Date().toLocaleTimeString('cs',{hour:'2-digit',minute:'2-digit'});

  const resp={
    blockId:currentRatingBlockId, blockType:block?.type||'přednáška',
    blockTitle:block?.title||'', participantId:participant.id,
    participantName:participant.name, overall, clarity,
    takeaway, relevance, moreInfo, buyRating, buyWhen, buyAmount, time,
    createdAt:Date.now()
  };
  await push(ref(db,'responses'), resp);

  if(question){
    await push(ref(db,'questions'),{
      blockId:currentRatingBlockId, blockTitle:block?.title||'',
      text:question, author:participant.name,
      status:'new', time, note:'', createdAt:Date.now()
    });
  }

  participant.rated = participant.rated||{};
  participant.rated[currentRatingBlockId]=true;
  localStorage.setItem('eva_participant', JSON.stringify(participant));

  // Show thanks
  const sorted=blocks.filter(b=>!['malá přestávka','velká přestávka','oběd'].includes(b.type));
  const idx=sorted.findIndex(b=>b.id===currentRatingBlockId);
  const next=sorted.slice(idx+1).find(b=>b.status==='next'||b.status==='live');
  const nb=document.getElementById('thanks-next');
  if(next){
    nb.innerHTML=`<div class="nb-label">Další blok</div><div class="nb-title">${esc(next.title)}</div><div class="nb-time">${next.start||''}${next.speaker?' · '+esc(next.speaker):''}</div>`;
    nb.style.display='block';
  } else nb.style.display='none';
  showScreen('scr-thanks');
}
window.submitRating=submitRating;

// ── QUESTIONS SCREEN ──
function renderQuestionsScreen(blockId, mode){
  get(ref(db,'questions')).then(snap=>{
    const all = snap.val()||{};
    const qs = Object.values(all).filter(q=>{
      if(q.status!=='approved') return false;
      if(mode==='block' && blockId) return q.blockId===blockId;
      return true;
    });
    document.getElementById('q-screen-title').textContent = mode==='all'?'Otázky z celé konference':'Otázky';
    const el=document.getElementById('q-screen-list');
    if(!qs.length){ el.innerHTML='<div class="empty">Žádné schválené otázky.</div>'; return; }
    el.innerHTML=qs.map(q=>`
      <div class="q-screen-item">
        <div class="q-screen-block">${esc(q.blockTitle)} · ${q.time}</div>
        <div class="q-screen-text">${esc(q.text)}</div>
        <div class="q-screen-author">— ${esc(q.author)}</div>
      </div>`).join('');
  });
}

// ── FINAL FORM ──
function renderFinalForm(){
  const BREAKS=['malá přestávka','velká přestávka','oběd'];
  const sortedBlocks=blocks.filter(b=>!BREAKS.includes(b.type));
  if(participant?.finalDone){
    document.getElementById('final-wrap').innerHTML=`<div class="thanks-wrap"><div class="thanks-icon">✓</div><div class="thanks-title">Závěr odeslán</div><div class="thanks-sub">Děkujeme za účast!</div></div>`;
    return;
  }
  document.getElementById('final-wrap').innerHTML=`
    <div style="text-align:center;padding:18px 0 14px">
      <div style="font-family:'Cormorant Garamond',serif;font-size:1.7rem;font-weight:600;color:var(--gold2)">Závěrečné hodnocení</div>
      <div style="font-size:.82rem;color:var(--muted);margin-top:3px">Jak hodnotíte celý den?</div>
    </div>
    <div class="field"><label>Nejpřínosnější blok</label>
      <select id="fin-best"><option value="">— vyberte —</option>${sortedBlocks.map(b=>`<option value="${b.id}">${esc(b.title)}</option>`).join('')}</select>
    </div>
    <div class="field"><label>Organizace akce</label><div class="star-row" id="stars-org" data-val="0"></div></div>
    <div class="field"><label>Atmosféra</label><div class="star-row" id="stars-atm" data-val="0"></div></div>
    <div class="field"><label>Témata zájmu do budoucna</label>
      <div class="chips" id="chips-future">
        <div class="chip" onclick="chipToggle(this)">Investice do nemovitostí</div>
        <div class="chip" onclick="chipToggle(this)">Alternativní investice</div>
        <div class="chip" onclick="chipToggle(this)">Daňová optimalizace</div>
        <div class="chip" onclick="chipToggle(this)">Produkty EVA</div>
        <div class="chip" onclick="chipToggle(this)">Individuální konzultace</div>
      </div>
    </div>
    <div class="field"><label>Investiční horizont</label>
      <div class="chips" id="chips-horizon">
        <div class="chip" onclick="chipSingle(this,'horizon')">Do 6 měsíců</div>
        <div class="chip" onclick="chipSingle(this,'horizon')">6–12 měsíců</div>
        <div class="chip" onclick="chipSingle(this,'horizon')">Příští rok+</div>
        <div class="chip" onclick="chipSingle(this,'horizon')">Zatím jen sleduji</div>
      </div>
    </div>
    <div class="field"><label>Co zlepšit? <span style="text-transform:none;font-weight:400;color:var(--muted)">(nepovinné)</span></label><textarea id="fin-improve" placeholder="Vaše poznámka…"></textarea></div>
    <button class="btn btn-primary" onclick="submitFinal()">Odeslat →</button>
    <div style="font-size:.72rem;color:var(--muted);text-align:center;margin-top:8px">Poté budete mít možnost dobrovolně zanechat kontakt.</div>
  `;
  renderStars('stars-org'); renderStars('stars-atm');
}

window.submitFinal=async()=>{
  const org=parseInt(document.getElementById('stars-org')?.dataset.val)||0;
  if(!org){ toast('Ohodnoťte prosím organizaci'); return; }
  const atm=parseInt(document.getElementById('stars-atm')?.dataset.val)||0;
  const future=[...document.querySelectorAll('#chips-future .chip.on')].map(c=>c.textContent).join(', ');
  const horizon=document.querySelector('#chips-horizon .chip.on')?.textContent||'';
  const improve=document.getElementById('fin-improve')?.value.trim()||'';
  const bestBlock=document.getElementById('fin-best')?.value||'';
  await push(ref(db,'final_surveys'),{
    participantId:participant.id, participantName:participant.name,
    orgRating:org, atmRating:atm, future, horizon, improve, bestBlock,
    createdAt:Date.now()
  });
  participant.finalDone=true;
  localStorage.setItem('eva_participant',JSON.stringify(participant));
  showLeadForm();
};

function showLeadForm(){
  document.getElementById('final-wrap').innerHTML=`
    <div style="text-align:center;padding:16px 0 12px">
      <div style="font-size:2rem;margin-bottom:6px">✓</div>
      <div style="font-family:'Cormorant Garamond',serif;font-size:1.4rem;font-weight:600;color:var(--gold2)">Hodnocení odesláno!</div>
      <div style="font-size:.82rem;color:var(--muted);margin-top:4px">Chcete zanechat kontakt? Je to zcela dobrovolné.</div>
    </div>
    <div style="background:var(--bg2);border:1px solid var(--border2);border-radius:12px;padding:16px;margin-bottom:14px">
      <div class="section-label" style="margin-bottom:12px">Dobrovolný kontakt</div>
      <div class="field"><label>Jméno</label><input type="text" id="lead-name" value="${esc(participant?.name||'')}"></div>
      <div class="field"><label>E-mail</label><input type="email" id="lead-email" placeholder="vas@email.cz"></div>
      <div class="field"><label>Telefon <span style="text-transform:none;font-weight:400;color:var(--muted)">(nepovinné)</span></label><input type="text" id="lead-phone" placeholder="+420 …"></div>
      <div class="field"><label>Téma zájmu</label>
        <div class="chips" id="chips-lead">
          <div class="chip" onclick="chipToggle(this)">Investice do nemovitostí</div>
          <div class="chip" onclick="chipToggle(this)">Produkty EVA</div>
          <div class="chip" onclick="chipToggle(this)">Alternativní investice</div>
          <div class="chip" onclick="chipToggle(this)">Individuální konzultace</div>
        </div>
      </div>
      <div class="field"><label>Poznámka <span style="text-transform:none;font-weight:400;color:var(--muted)">(nepovinné)</span></label><textarea id="lead-note" placeholder="Cokoliv chcete dodat…"></textarea></div>
      <div class="toggle-row"><span>Souhlasím s kontaktováním ze strany EVA</span><label class="toggle-wrap"><input type="checkbox" id="lead-consent"><div class="toggle-slider"></div></label></div>
    </div>
    <button class="btn btn-primary" onclick="submitLead()">Zanechat kontakt →</button>
    <button class="btn btn-outline" onclick="showLeadThanks()" style="margin-top:6px">Přeskočit</button>
  `;
}

window.submitLead=async()=>{
  const name=document.getElementById('lead-name')?.value.trim();
  const email=document.getElementById('lead-email')?.value.trim();
  if(!name){ toast('Zadejte jméno'); return; }
  if(!email){ toast('Zadejte e-mail'); return; }
  const consent=document.getElementById('lead-consent')?.checked||false;
  const topic=[...document.querySelectorAll('#chips-lead .chip.on')].map(c=>c.textContent).join(', ');
  await push(ref(db,'leads'),{
    participantId:participant.id, name, email,
    phone:document.getElementById('lead-phone')?.value.trim()||'',
    topic, note:document.getElementById('lead-note')?.value.trim()||'',
    consent, consentAt:consent?new Date().toISOString():null,
    createdAt:Date.now()
  });
  showLeadThanks();
};

window.showLeadThanks=()=>{
  document.getElementById('final-wrap').innerHTML=`
    <div class="thanks-wrap">
      <div class="thanks-icon">◆</div>
      <div class="thanks-title">Děkujeme za účast!</div>
      <div class="thanks-sub">Těšíme se na vás na příštím EVA eventu.</div>
    </div>
    <div style="text-align:center;font-size:.8rem;color:var(--muted);margin-top:16px">portal-eva.com</div>
  `;
};

// ── INIT ──
startListening();
if(participant){
  document.getElementById('hdr-name').textContent = participant.name;
  showScreen('scr-main');
}
</script>
</body>
</html>
